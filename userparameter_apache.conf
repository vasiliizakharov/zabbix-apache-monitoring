# Zabbix UserParameters for Apache HTTP Server (mod_status)
# Author: Vasilii Zakharov <vasiliiazakharov@gmail.com>
# License: MIT
#
# Expects mod_status enabled on http://127.0.0.1/server-status?auto.
# See README.md for the Apache configuration snippet.

# Full mod_status raw text — use as a master item with dependent items if you
# want to avoid hammering Apache on every poll.
UserParameter=apache.status.raw[*],curl -s -f -m 5 "http://$1/server-status?auto" 2>/dev/null

# Individual parsed metrics
UserParameter=apache.busy_workers[*],curl -s -f -m 5 "http://$1/server-status?auto" 2>/dev/null | awk -F': ' '/^BusyWorkers:/{print $2}'
UserParameter=apache.idle_workers[*],curl -s -f -m 5 "http://$1/server-status?auto" 2>/dev/null | awk -F': ' '/^IdleWorkers:/{print $2}'
UserParameter=apache.req_per_sec[*],curl -s -f -m 5 "http://$1/server-status?auto" 2>/dev/null | awk -F': ' '/^ReqPerSec:/{print $2+0}'
UserParameter=apache.bytes_per_sec[*],curl -s -f -m 5 "http://$1/server-status?auto" 2>/dev/null | awk -F': ' '/^BytesPerSec:/{print $2+0}'
UserParameter=apache.bytes_per_req[*],curl -s -f -m 5 "http://$1/server-status?auto" 2>/dev/null | awk -F': ' '/^BytesPerReq:/{print $2+0}'
UserParameter=apache.uptime[*],curl -s -f -m 5 "http://$1/server-status?auto" 2>/dev/null | awk -F': ' '/^ServerUptimeSeconds:/{print $2+0}'
UserParameter=apache.total_accesses[*],curl -s -f -m 5 "http://$1/server-status?auto" 2>/dev/null | awk -F': ' '/^Total Accesses:/{print $2+0}'
UserParameter=apache.total_kbytes[*],curl -s -f -m 5 "http://$1/server-status?auto" 2>/dev/null | awk -F': ' '/^Total kBytes:/{print $2+0}'
UserParameter=apache.cpu_load[*],curl -s -f -m 5 "http://$1/server-status?auto" 2>/dev/null | awk -F': ' '/^CPULoad:/{print $2+0}'

# Scoreboard slots: pass single-letter as $2
#   _ = waiting     S = starting        R = reading request
#   W = sending     K = keepalive       D = DNS lookup
#   C = closing     L = logging         G = graceful finishing
#   I = idle cleanup of worker
#   . = open slot, no current process
UserParameter=apache.scoreboard[*],/usr/local/bin/zbx_apache_scoreboard.sh "$1" "$2"
